{% extends 'base.html' %}
{% block title %}Cadastro{% endblock %}
{% block content %}

<div class="bb-form-card bb-form-card--narrow">
  <div class="bb-form-card__header">
    <div class="bb-page-header__eyebrow">Novo usuário</div>
    <h3 class="bb-form-card__title">Cadastro</h3>
    <p style="font-size:.85rem;color:var(--text-2);margin-top:.5rem;font-weight:300">
      Crie sua conta para agendar horários na barbearia.
    </p>
  </div>
  <div class="bb-form-card__body">
    <form method="post" class="bb-form">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="bb-form__actions">
        <button type="submit" class="bb-btn bb-btn--gold">Cadastrar</button>
        <a href="{% url 'login' %}" class="bb-btn bb-btn--ghost">Já tenho conta</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
