{% extends 'base.html' %}
{% block title %}Cadastro{% endblock %}
{% block content %}
<div class="card card-modern col-lg-7 mx-auto">
    <div class="card-body">
        <h3 class="mb-3">Cadastro de usuário</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Cadastrar</button>
        </form>
    </div>
</div>
{% endblock %}
