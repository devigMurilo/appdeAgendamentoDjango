{% extends 'base.html' %}
{% block title %}Entrar{% endblock %}
{% block content %}
<div class="card card-modern col-lg-5 mx-auto">
    <div class="card-body">
        <h3 class="mb-3">Login</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Entrar</button>
            <a class="btn btn-link" href="{% url 'password_reset' %}">Esqueci minha senha</a>
        </form>
    </div>
</div>
{% endblock %}
