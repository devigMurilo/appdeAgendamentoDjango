{% extends 'base.html' %}
{% block title %}Recuperar senha{% endblock %}
{% block content %}
<div class="card card-modern col-lg-6 mx-auto">
    <div class="card-body">
        <h3 class="mb-3">Recuperação de senha</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Enviar link</button>
        </form>
    </div>
</div>
{% endblock %}
