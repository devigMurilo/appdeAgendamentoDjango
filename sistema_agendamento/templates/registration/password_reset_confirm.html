{% extends 'base.html' %}
{% block title %}Nova senha{% endblock %}
{% block content %}
<div class="card card-modern col-lg-6 mx-auto">
    <div class="card-body">
        <h3 class="mb-3">Definir nova senha</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Salvar nova senha</button>
        </form>
    </div>
</div>
{% endblock %}
