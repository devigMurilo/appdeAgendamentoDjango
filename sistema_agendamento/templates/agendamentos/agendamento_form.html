{% extends 'base.html' %}
{% block title %}Agendamento{% endblock %}
{% block content %}

<div class="bb-form-card">
  <div class="bb-form-card__header">
    <div class="bb-page-header__eyebrow">Agendamento</div>
    <h3 class="bb-form-card__title">{{ view.object|default_if_none:'Novo' }} Agendamento</h3>
  </div>
  <div class="bb-form-card__body">
    <form method="post" class="bb-form">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="bb-form__actions">
        <button class="bb-btn bb-btn--gold" type="submit">Salvar</button>
        <a class="bb-btn bb-btn--ghost" href="{% url 'agendamentos:agendamento_cliente_list' %}">Voltar</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
