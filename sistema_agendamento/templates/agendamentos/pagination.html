{% if is_paginated %}
<nav class="bb-pagination" aria-label="Paginação">
  {% if page_obj.has_previous %}
    <a class="bb-pagination__link" href="?page={{ page_obj.previous_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.data %}&data={{ request.GET.data }}{% endif %}">← Anterior</a>
  {% endif %}
  <span class="bb-pagination__current">{{ page_obj.number }}</span>
  {% if page_obj.has_next %}
    <a class="bb-pagination__link" href="?page={{ page_obj.next_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.data %}&data={{ request.GET.data }}{% endif %}">Próxima →</a>
  {% endif %}
</nav>
{% endif %}
