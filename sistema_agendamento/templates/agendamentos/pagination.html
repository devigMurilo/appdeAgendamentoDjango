{% if is_paginated %}
<nav class="mt-3" aria-label="Paginação">
    <ul class="pagination">
        {% if page_obj.has_previous %}
            <li class="page-item"><a class="page-link" href="?page={{ page_obj.previous_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.data %}&data={{ request.GET.data }}{% endif %}">Anterior</a></li>
        {% endif %}
        <li class="page-item active"><span class="page-link">{{ page_obj.number }}</span></li>
        {% if page_obj.has_next %}
            <li class="page-item"><a class="page-link" href="?page={{ page_obj.next_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.data %}&data={{ request.GET.data }}{% endif %}">Próxima</a></li>
        {% endif %}
    </ul>
</nav>
{% endif %}
