{% extends 'base.html' %}
{% block title %}Confirmação{% endblock %}
{% block content %}

<div class="bb-form-card bb-form-card--narrow bb-form-card--danger-zone">
  <div class="bb-form-card__header">
    <div class="bb-page-header__eyebrow">Atenção</div>
    <h3 class="bb-form-card__title">Confirmar ação</h3>
  </div>
  <div class="bb-form-card__body">
    <p class="bb-form-card__desc">Esta ação não pode ser desfeita. Deseja continuar?</p>
    <form method="post" class="bb-form">
      {% csrf_token %}
      <div class="bb-form__actions">
        <button class="bb-btn bb-btn--danger" type="submit">Confirmar</button>
        <a class="bb-btn bb-btn--ghost" href="javascript:history.back()">Voltar</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
