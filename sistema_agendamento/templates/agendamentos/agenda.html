{% extends 'base.html' %}
{% block title %}Agenda da Barbearia{% endblock %}
{% block content %}

<div class="bb-page-header">
  <div>
    <div class="bb-page-header__eyebrow">Reservas</div>
    <h2 class="bb-page-header__title">Agenda Profissional</h2>
    <p class="bb-page-header__sub">Escolha a data para ver os horários disponíveis.</p>
  </div>
  <span class="bb-badge">Seg – Sáb &nbsp;|&nbsp; 09:00 – 19:00</span>
</div>

<div class="bb-panel">
  <div class="bb-panel__body">

    <div class="bb-form-row">
      <div class="bb-field">
        <label class="bb-label" for="dataAgenda">Data do atendimento</label>
        <input type="date" id="dataAgenda" class="bb-input" min="{{ today|default:'' }}">
      </div>
      <div class="bb-field bb-field--action">
        <button id="btnCarregar" class="bb-btn bb-btn--gold" disabled>Carregar horários</button>
      </div>
    </div>

    <div id="mensagem" class="bb-alert bb-alert--hidden" role="alert"></div>

    <div id="gradeHorarios" class="bb-slot-grid"></div>

  </div>
</div>

<script>
(function () {
  const dataInput   = document.getElementById('dataAgenda');
  const btnCarregar = document.getElementById('btnCarregar');
  const grade       = document.getElementById('gradeHorarios');
  const mensagem    = document.getElementById('mensagem');

  dataInput.min = new Date().toISOString().split('T')[0];

  function limparMensagem() {
    mensagem.className = 'bb-alert bb-alert--hidden';
    mensagem.textContent = '';
  }

  function mostrarMensagem(texto, tipo = 'info') {
    mensagem.className = `bb-alert bb-alert--${tipo}`;
    mensagem.textContent = texto;
  }

  function botaoHorario(item, dataSelecionada) {
    const el = document.createElement(item.ocupado ? 'span' : 'a');
    el.classList.add('bb-slot');

    if (item.ocupado) {
      el.classList.add('bb-slot--busy');
      el.textContent = item.hora + ' · Ocupado';
      el.setAttribute('aria-disabled', 'true');
    } else {
      el.classList.add('bb-slot--free');
      el.textContent = item.hora;
      el.href = `{% url 'agendamentos:agendamento_create_agenda' %}?data=${dataSelecionada}&hora=${item.hora}`;
    }
    return el;
  }

  async function carregarHorarios() {
    const dataSelecionada = dataInput.value;
    grade.innerHTML = '';
    limparMensagem();

    if (!dataSelecionada) {
      mostrarMensagem('Selecione uma data para continuar.', 'warning');
      return;
    }

    btnCarregar.classList.add('bb-btn--loading');
    btnCarregar.disabled = true;

    try {
      const response = await fetch(`{% url 'agendamentos:horarios_disponiveis' %}?data=${dataSelecionada}`);
      const payload  = await response.json();

      if (!response.ok) {
        mostrarMensagem(payload.erro || 'Não foi possível carregar os horários.', 'warning');
        return;
      }

      if (!Array.isArray(payload) || payload.length === 0) {
        mostrarMensagem('Nenhum horário disponível para esta data.', 'info');
        return;
      }

      payload.forEach(item => grade.appendChild(botaoHorario(item, dataSelecionada)));
    } catch {
      mostrarMensagem('Erro de comunicação com o servidor. Tente novamente.', 'danger');
    } finally {
      btnCarregar.classList.remove('bb-btn--loading');
      btnCarregar.disabled = false;
    }
  }

  dataInput.addEventListener('change', () => {
    btnCarregar.disabled = !dataInput.value;
    grade.innerHTML = '';
    limparMensagem();
  });

  btnCarregar.addEventListener('click', carregarHorarios);
})();
</script>
{% endblock %}
